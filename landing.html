<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Landing Page</title>
  <style>
    :root {
      --bg-top: #eef5ff;
      --bg-bottom: #d5e6ff;
      --card-bg: rgba(255, 255, 255, 0.92);
      --card-border: rgba(47, 107, 255, 0.14);
      --text-main: #18233d;
      --text-muted: #5f6c8d;
      --accent: #2f6bff;
      --accent-dark: #1744ba;
      --shadow: 0 24px 60px rgba(24, 35, 61, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at top right, rgba(47, 107, 255, 0.2), transparent 28%),
        linear-gradient(145deg, var(--bg-top), var(--bg-bottom));
    }

    .welcome-card {
      width: min(100%, 700px);
      padding: 48px 36px;
      border-radius: 28px;
      border: 1px solid var(--card-border);
      background: var(--card-bg);
      box-shadow: var(--shadow);
      text-align: center;
    }

    .tag {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--accent);
      background: rgba(47, 107, 255, 0.1);
    }

    h1 {
      margin: 20px 0 12px;
      font-size: clamp(2rem, 4vw, 3rem);
    }

    p {
      margin: 0 auto;
      max-width: 540px;
      color: var(--text-muted);
      font-size: 1.02rem;
      line-height: 1.7;
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 28px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 160px;
      padding: 14px 18px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 700;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .button.primary {
      color: #ffffff;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      box-shadow: 0 16px 30px rgba(47, 107, 255, 0.24);
    }

    .button.secondary {
      color: var(--accent);
      background: rgba(47, 107, 255, 0.08);
    }

    .button:hover {
      transform: translateY(-2px);
    }

    .info-box {
      margin-top: 28px;
      padding: 18px;
      border-radius: 18px;
      background: rgba(47, 107, 255, 0.06);
      color: var(--text-main);
      font-weight: 600;
    }

    @media (max-width: 480px) {
      .welcome-card {
        padding: 36px 22px;
        border-radius: 22px;
      }
    }
  </style>
</head>
<body>
  <main class="welcome-card">
    <span class="tag">Landing Page</span>
    <h1 id="welcomeHeading">Welcome Admin</h1>
    <p>
      You have successfully logged in. This is a simple landing page built with plain
      HTML, CSS, and JavaScript.
    </p>

    <div class="info-box" id="userInfo">Logged in as: admin@gmail.com</div>

    <div class="actions">
      <a class="button primary" href="index.html">Back to Login</a>
      <a class="button secondary" href="#" id="logoutButton">Logout</a>
    </div>
  </main>

  <script>
    const isAdminLoggedIn = localStorage.getItem("isAdminLoggedIn");
    const adminEmail = localStorage.getItem("adminEmail") || "admin@gmail.com";
    const userInfo = document.getElementById("userInfo");
    const logoutButton = document.getElementById("logoutButton");

    if (isAdminLoggedIn !== "true") {
      window.location.href = "index.html";
    } else {
      userInfo.textContent = "Logged in as: " + adminEmail;
    }

    logoutButton.addEventListener("click", function (event) {
      event.preventDefault();
      localStorage.removeItem("isAdminLoggedIn");
      localStorage.removeItem("adminEmail");
      window.location.href = "index.html";
    });
  </script>
</body>
</html>
